name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace -- -D warnings

      # Runs before the broad workspace test suite so a physics regression
      # fails fast under an unambiguous step name instead of being buried in
      # workspace-wide test output. If this fails, see PHYSICS_CHANGE.md for
      # the required next step (fix a regression, or log + regenerate the
      # fixture for an intended change).
      - name: Golden-lap physics regression gate
        run: cargo test -p apex-14 --test golden_lap

      - name: Test
        run: cargo test --workspace

      - name: Release build
        run: cargo build --release --workspace
